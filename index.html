<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sedimentary Basin - A Diary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        :root {
            --brown-dark: #6F4F28;
            --brown-medium: #8B6B4C;
            --brown-light: #A58B78;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: #e0e0e0;
            overflow: hidden;
        }

        .reader-container {
            position: relative;
            width: 95vw;
            height: 95vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* ✅ 只改这里 */
        .page-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center center;
            display: block;

            opacity: 1;
            filter: blur(0px);
            transition: opacity 0.8s ease-in-out, filter 0.8s ease-in-out;
        }

        .dissolve-out {
            opacity: 0 !important;
            filter: blur(10px) !important;
        }

        .nav-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 20px 15px;
            font-size: 30px;
            cursor: pointer;
            z-index: 100;
            transition: background-color 0.3s ease;
            border-radius: 5px;
        }

        .nav-button:hover:not(:disabled) {
            background-color: rgba(0, 0, 0, 0.8);
        }

        .nav-button:disabled {
            background-color: rgba(0, 0, 0, 0.2);
            cursor: not-allowed;
            color: #888;
        }

        #prevBtn { left: 10px; }
        #nextBtn { right: 10px; }

        .controls-bottom {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 200;
        }

        .page-info {
            font-size: 16px;
            font-weight: bold;
            color: #ccc;
        }

        .controls-top-right {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 8px;
            z-index: 200;
        }

        .controls-top-right button {
            padding: 8px 15px;
            font-size: 14px;
            background-color: var(--brown-dark);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .controls-top-right button:hover {
            background-color: var(--brown-medium);
        }

        .controls-top-right button:disabled {
            background-color: var(--brown-light);
            cursor: not-allowed;
        }

        .bgm-status {
            font-size: 14px;
            color: #fff;
            margin-left: -5px;
            margin-right: 5px;
        }
    </style>
</head>

<body>

<div class="reader-container">
    <img id="currentPageImage" class="page-image" src="" alt="Diary Page">

    <button id="prevBtn" class="nav-button" onclick="changePage(-1)">
        <i class="fas fa-chevron-left"></i>
    </button>

    <button id="nextBtn" class="nav-button" onclick="changePage(1)">
        <i class="fas fa-chevron-right"></i>
    </button>

    <div class="controls-bottom">
        <span id="pageInfo" class="page-info"></span>
    </div>

    <div class="controls-top-right">
        <button id="langToggleBtn" onclick="toggleLanguage()">Switch to English</button>

        <audio id="backgroundMusic" loop>
            <source src="audio/bgm.mp3" type="audio/mpeg">
        </audio>

        <span id="bgmStatusText" class="bgm-status">BGM: ON</span>

        <button id="muteToggleBtn" onclick="toggleMute()">
            <i class="fas fa-volume-up"></i>
        </button>
    </div>
</div>

<script>
const totalPages = 17;
let currentPage = 1;
let isEnglish = false;
let isMuted = false;

const imagePaths = { zh: [], en: [] };

for (let i = 1; i <= totalPages; i++) {
    imagePaths.zh.push(`images/${i}.jpg`);

    if (i === 1) {
        imagePaths.en.push(`images/1.jpg`);
    } else if (i <= 9) {
        imagePaths.en.push(`images/${String(i).padStart(2, '0')}.jpg`);
    } else {
        imagePaths.en.push(`images/${String(i).padStart(3, '0')}.jpg`);
    }
}

const currentPageImage = document.getElementById('currentPageImage');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const pageInfo = document.getElementById('pageInfo');
const langToggleBtn = document.getElementById('langToggleBtn');
const backgroundMusic = document.getElementById('backgroundMusic');
const muteToggleBtn = document.getElementById('muteToggleBtn');
const bgmStatusText = document.getElementById('bgmStatusText');

backgroundMusic.volume = 1;

function updateImageSource() {
    const langPrefix = isEnglish ? 'en' : 'zh';
    currentPageImage.src = imagePaths[langPrefix][currentPage - 1];
}

function updateUI() {
    pageInfo.textContent = `Page ${currentPage} / ${totalPages}`;
    prevBtn.disabled = currentPage === 1;
    nextBtn.disabled = currentPage === totalPages;
    langToggleBtn.textContent = isEnglish ? '切换至中文' : 'Switch to English';

    if (isMuted) {
        muteToggleBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
        bgmStatusText.textContent = 'BGM: OFF';
    } else {
        muteToggleBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
        bgmStatusText.textContent = 'BGM: ON';
    }
}

function changePage(direction) {
    const newPage = currentPage + direction;
    if (newPage >= 1 && newPage <= totalPages) {
        currentPageImage.classList.add('dissolve-out');

        setTimeout(() => {
            currentPage = newPage;
            updateImageSource();
            currentPageImage.classList.remove('dissolve-out');
            updateUI();
        }, 800);
    }
}

function toggleLanguage() {
    isEnglish = !isEnglish;
    updateImageSource();
    updateUI();
}

function toggleMute() {
    if (backgroundMusic.muted) {
        backgroundMusic.muted = false;
        isMuted = false;
        backgroundMusic.play().catch(() => {});
    } else {
        backgroundMusic.muted = true;
        isMuted = true;
    }
    updateUI();
}

updateImageSource();
updateUI();

window.addEventListener('load', () => {
    backgroundMusic.play().catch(() => {
        backgroundMusic.muted = true;
        isMuted = true;
        updateUI();
    });
});
</script>

</body>
</html>
